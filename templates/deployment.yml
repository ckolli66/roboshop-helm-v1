apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  labels:
    app: {{ .Values.appName }}
    project: {{ .Values.projectName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.appName }}
      project: {{ .Values.projectName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        project: {{ .Values.projectName }}
    spec:
      containers:
        - name: {{ .Values.appName }}
          image: 444206648334.dkr.ecr.us-east-1.amazonaws.com/{{ .Values.appName }}:latest
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}