apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
spec:
  type: {{ .Values.serviceType }}
  selector:
    app: {{ .Values.appName }}
    project: {{ .Values.projectName }}
  ports:
    - protocol: TCP
      port: {{ .Values.appPort }}
      targetPort: {{ .Values.appPort }}
      name: default
  {{ if eq .Values.appName "frontend" }}
    - protocol: TCP
      port: 9113
      targetPort: 9113
      name: metrics
  {{ end }}